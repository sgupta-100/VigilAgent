[pytest]
testpaths = tests
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Default options (coverage is opt-in via CLI to keep default runs fast)
addopts =
    --strict-markers
    --tb=short

# Markers
markers =
    unit: Unit tests
    integration: Integration tests requiring external services
    e2e: End-to-end tests
    slow: Slow running tests (deselect with '-m "not slow"')
    asyncio: Async tests

# Ignore paths
norecursedirs =
    .git
    .pytest_cache
    __pycache__
    node_modules
    dist
    build

filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
